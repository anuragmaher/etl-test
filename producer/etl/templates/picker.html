<!DOCTYPE html>
<html>
<head>
    <title>ETL Pipeline - Select Folders</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 32px; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #4285f4;
            color: white;
        }
        .btn-primary:hover { background: #3367d6; }
        .btn-secondary {
            background: #e8e8e8;
            color: #333;
            margin-left: 12px;
        }
        .btn-secondary:hover { background: #d0d0d0; }
        .selected-folders {
            margin: 24px 0;
            text-align: left;
        }
        .selected-folders h3 {
            font-size: 14px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 12px;
        }
        .folder-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: #f0f7ff;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .folder-item .icon { margin-right: 10px; font-size: 20px; }
        .folder-item .name { flex: 1; }
        .folder-item .remove {
            cursor: pointer;
            color: #999;
            font-size: 18px;
        }
        .folder-item .remove:hover { color: #e53935; }
        .actions { margin-top: 24px; }
        .status { margin-top: 16px; color: #4caf50; display: none; }
        .status.error { color: #e53935; }
        #loading { display: none; color: #666; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Select Folders to Sync</h1>
        <p class="subtitle">Choose Google Drive folders to pull documents from</p>

        <button class="btn btn-primary" onclick="openPicker()">
            Open Folder Picker
        </button>

        <div id="loading">Loading Google Picker...</div>

        <div class="selected-folders" id="selectedSection" style="display:none">
            <h3>Selected Folders</h3>
            <div id="folderList"></div>
        </div>

        <div class="actions" id="actionsSection" style="display:none">
            <button class="btn btn-primary" onclick="saveSelection()">Save & Start Syncing</button>
            <button class="btn btn-secondary" onclick="openPicker()">Add More</button>
        </div>

        <p class="status" id="status"></p>
    </div>

    <script>
        const CONFIG = {
            apiKey: "{{API_KEY}}",
            clientId: "{{CLIENT_ID}}",
            accessToken: "{{ACCESS_TOKEN}}",
            appId: "{{APP_ID}}"
        };

        let selectedFolders = [];
        let pickerLoaded = false;

        // Load the Google Picker API
        function loadPickerApi() {
            const script = document.createElement('script');
            script.src = 'https://apis.google.com/js/api.js';
            script.onload = () => {
                gapi.load('picker', () => { pickerLoaded = true; });
            };
            document.head.appendChild(script);
        }

        function openPicker() {
            if (!pickerLoaded) {
                document.getElementById('loading').style.display = 'block';
                setTimeout(openPicker, 500);
                return;
            }
            document.getElementById('loading').style.display = 'none';

            const view = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
                .setSelectFolderEnabled(true)
                .setMimeTypes('application/vnd.google-apps.folder');

            const picker = new google.picker.PickerBuilder()
                .setTitle('Select folders to sync')
                .addView(view)
                .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
                .setOAuthToken(CONFIG.accessToken)
                .setDeveloperKey(CONFIG.apiKey)
                .setAppId(CONFIG.appId)
                .setCallback(pickerCallback)
                .build();

            picker.setVisible(true);
        }

        function pickerCallback(data) {
            if (data.action === google.picker.Action.PICKED) {
                for (const doc of data.docs) {
                    if (!selectedFolders.find(f => f.id === doc.id)) {
                        selectedFolders.push({ id: doc.id, name: doc.name });
                    }
                }
                renderFolders();
            }
        }

        function renderFolders() {
            const section = document.getElementById('selectedSection');
            const list = document.getElementById('folderList');
            const actions = document.getElementById('actionsSection');

            if (selectedFolders.length === 0) {
                section.style.display = 'none';
                actions.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            actions.style.display = 'block';

            list.innerHTML = selectedFolders.map((f, i) => `
                <div class="folder-item">
                    <span class="icon">📁</span>
                    <span class="name">${f.name}</span>
                    <span class="remove" onclick="removeFolder(${i})">✕</span>
                </div>
            `).join('');
        }

        function removeFolder(index) {
            selectedFolders.splice(index, 1);
            renderFolders();
        }

        async function saveSelection() {
            const status = document.getElementById('status');
            try {
                const response = await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ folders: selectedFolders })
                });

                if (response.ok) {
                    status.className = 'status';
                    status.textContent = 'Configuration saved! You can close this window.';
                    status.style.display = 'block';
                } else {
                    throw new Error('Failed to save');
                }
            } catch (err) {
                status.className = 'status error';
                status.textContent = 'Error saving configuration. Check the terminal.';
                status.style.display = 'block';
            }
        }

        loadPickerApi();
    </script>
</body>
</html>
